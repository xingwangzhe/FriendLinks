  description: 彭氏胖纸者，名迁，江陵人，诞于夏。少聪慧，敏于学。 古人有言，曰：趋于地，就于时。迁者诞于炎炎之夏，故活泼而好动。江陵者襟江带河，集日月精华，文人骚客多出于此，迁虽芸芸之其一，实粹粹然也。 迁之性，稳而健，平而滑。若得于古，不可为刺客而说客也夫刺客，静若处子，动若蛇蝎。偏安于角落，偶然爆发。而说客者，平滑婉转，若流水，或缓或急，然不可断绝也。 迁者，柔弱如水，暴怒如江。遏飞舟击巉石曲回肠终归海。
