site:
  name: "微风静语｜在微风中轻语自己，在宁静中书写世界"
  description: "静而不寂，语而不争，「微风静语」是记录代码与生活共鸣的成长手记。这里有技术折腾的烟火气：从开源项目协作初体验的忐忑，到DIY小工具时的反复试错；从技术实验的碎碎念，到对数字工具的深度思考。偶尔捕捉咖啡渍染的书页光影，更多时候是真诚分享那些“虽不完美但真实”的代码实践——无论是给开源项目提交PR时的笨拙尝试，还是用自动化脚本点亮生活的小魔法。在创造与沉淀的循环中，与你共同见证非科班小白的技术觉醒之路。"
  url: "https://www.webjing.cn"
